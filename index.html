<script>
function switchTab(evt, tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    evt.currentTarget.classList.add('active');
}

// 解析帶數量的文字 (如 "16煤礦" -> amount: 16, name: "煤礦")
function parseItem(val) {
    if (!val || val === "無" || val === 0) return null;
    if (typeof val === 'number') return { amount: val, name: "" };
    const str = String(val).trim();
    const match = str.match(/^(\d+)(.+)$/);
    if (match) return { amount: parseInt(match[1]), name: match[2].trim() };
    return { amount: 1, name: str };
}

// 格式化數量 (轉換 64 個為一組的邏輯)
function formatQuantity(total, useStackMode) {
    if (!total || total <= 0) return '0';
    if (!useStackMode) return total.toLocaleString();

    const stackSize = 64;
    const stacks = Math.floor(total / stackSize);
    const remainder = total % stackSize;

    if (stacks > 0 && remainder > 0) {
        return `${stacks} 組 + ${remainder} 個 (${total.toLocaleString()})`;
    } else if (stacks > 0) {
        return `${stacks} 組 (${total.toLocaleString()})`;
    } else {
        return `${remainder} 個`;
    }
}

window.onload = function() {
    // 載入分頁一的下拉選單
    const itemSelect = document.getElementById("itemSelect");
    for (let key in gameData) {
        let opt = document.createElement("option");
        opt.value = key;
        opt.innerText = key;
        itemSelect.appendChild(opt);
    }
    updateStageOptions();

    // 載入分頁二的寶石選單
    const gemTypeSelect = document.getElementById("gemTypeSelect");
    for (let gem in gemData) {
        let opt = document.createElement("option");
        opt.value = gem;
        opt.innerText = gem;
        gemTypeSelect.appendChild(opt);
    }
    updateGemStages();
};

/* --- 分頁一邏輯 --- */
function updateStageOptions() {
    const selectedItem = document.getElementById("itemSelect").value;
    const startSelect = document.getElementById("startStageSelect");
    const endSelect = document.getElementById("endStageSelect");
    
    startSelect.innerHTML = "";
    endSelect.innerHTML = "";
    
    const stages = gameData[selectedItem].stages;
    
    stages.forEach((stage, idx) => {
        let optStart = document.createElement("option");
        optStart.value = idx;
        optStart.innerText = stage;
        startSelect.appendChild(optStart);

        let optEnd = document.createElement("option");
        optEnd.value = idx;
        optEnd.innerText = stage;
        endSelect.appendChild(optEnd);
    });

    startSelect.value = 0;
    endSelect.value = stages.length - 1;

    calculate();
}

function validateAndCalculate() {
    const startIdx = parseInt(document.getElementById("startStageSelect").value);
    const endIdx = parseInt(document.getElementById("endStageSelect").value);

    if (startIdx > endIdx) {
        document.getElementById("endStageSelect").value = startIdx;
    }
    calculate();
}

function addSingleRingMaterials(totals, targetRingTier) {
    const ringData = gameData["經驗戒指"].data;
    for (let t = 0; t < targetRingTier; t++) {
        let row = ringData[t];
        totals["礦物精華"] = (totals["礦物精華"] || 0) + row.礦物精華;
        totals["星河結晶"] = (totals["星河結晶"] || 0) + row.星河結晶;
        totals["下品星石"] = (totals["下品星石"] || 0) + row.下品星石;
        if (row.金錢) totals["金錢"] = (totals["金錢"] || 0) + row.金錢;

        let m = parseItem(row.礦物);
        if (m) totals[m.name] = (totals[m.name] || 0) + m.amount;

        let boss = parseItem(row.王掉落物);
        if (boss) totals[boss.name] = (totals[boss.name] || 0) + boss.amount;

        ["掉落物1", "掉落物2", "掉落物3"].forEach(key => {
            let drop = parseItem(row[key]);
            if (drop) totals[drop.name] = (totals[drop.name] || 0) + drop.amount;
        });
    }
}

function calculate() {
    const itemName = document.getElementById("itemSelect").value;
    const startIdx = parseInt(document.getElementById("startStageSelect").value);
    const endIdx = parseInt(document.getElementById("endStageSelect").value);
    const useStackMode = document.getElementById("toggleStackMode1").checked;
    const itemInfo = gameData[itemName];
    
    let totals = {};
    let infoMsg = `計算範圍：持有 <b>${itemInfo.stages[startIdx]}</b> ➔ 目標升至 <b>${itemInfo.stages[endIdx]}</b>`;

    if (itemName === "經驗戒指") {
        const ringData = gameData["經驗戒指"].data;
        for (let t = startIdx; t < endIdx; t++) {
            let row = ringData[t];
            totals["礦物精華"] = (totals["礦物精華"] || 0) + row.礦物精華;
            totals["星河結晶"] = (totals["星河結晶"] || 0) + row.星河結晶;
            totals["下品星石"] = (totals["下品星石"] || 0) + row.下品星石;
            if (row.金錢) totals["金錢"] = (totals["金錢"] || 0) + row.金錢;

            let m = parseItem(row.礦物);
            if (m) totals[m.name] = (totals[m.name] || 0) + m.amount;

            let boss = parseItem(row.王掉落物);
            if (boss) totals[boss.name] = (totals[boss.name] || 0) + boss.amount;

            ["掉落物1", "掉落物2", "掉落物3"].forEach(key => {
                let drop = parseItem(row[key]);
                if (drop) totals[drop.name] = (totals[drop.name] || 0) + drop.amount;
            });
        }
    } else {
        for (let i = startIdx; i < endIdx; i++) {
            let row = itemInfo.data[i];
            totals["採集精華"] = (totals["採集精華"] || 0) + row.採集精華;
            totals["星河結晶"] = (totals["星河結晶"] || 0) + row.星河結晶;
            totals["下品星石"] = (totals["下品星石"] || 0) + row.下品星石;
            if (row.中品星石 !== undefined) totals["中品星石"] = (totals["中品星石"] || 0) + row.中品星石;
            if (row.藥劑瓶 !== undefined) totals["藥劑瓶"] = (totals["藥劑瓶"] || 0) + row.藥劑瓶;
            if (row.金錢 !== undefined) totals["金錢"] = (totals["金錢"] || 0) + row.金錢;

            if (row.材料) {
                let parsed = parseItem(row.材料);
                if (parsed) totals[parsed.name] = (totals[parsed.name] || 0) + parsed.amount;
            }
        }

        if (itemName === "究極經驗") {
            infoMsg += `<br><b>※ 消耗機制：製作每階藥水皆需額外獻祭 1 枚獨立製作的對應階數經驗戒指！</b>`;
            for (let i = startIdx; i < endIdx; i++) {
                let consumedRingTier = itemInfo.ringMapping[i + 1];
                if (consumedRingTier > 0) {
                    addSingleRingMaterials(totals, consumedRingTier);
                }
            }
        }
    }

    document.getElementById("infoText").innerHTML = infoMsg;
    const tbody = document.querySelector("#resultTable tbody");
    tbody.innerHTML = "";

    // 優先印出非金錢材料（套用數量轉換），最後高亮印出金錢
    for (let matName in totals) {
        if (totals[matName] > 0 && matName !== "金錢") {
            let tr = document.createElement("tr");
            let displayVal = formatQuantity(totals[matName], useStackMode);
            tr.innerHTML = `<td><b>${matName}</b></td><td>${displayVal}</td>`;
            tbody.appendChild(tr);
        }
    }

    if (totals["金錢"] > 0) {
        let tr = document.createElement("tr");
        tr.className = "money-row";
        tr.innerHTML = `<td><b>💰 金錢 (Coins)</b></td><td><b>$ ${totals["金錢"].toLocaleString()}</b></td>`;
        tbody.appendChild(tr);
    }
}

/* --- 分頁二：各類寶石邏輯 --- */
function updateGemStages() {
    const gemType = document.getElementById("gemTypeSelect").value;
    const gemStageSelect = document.getElementById("gemStageSelect");
    gemStageSelect.innerHTML = "";

    const stages = gemData[gemType].stages;
    stages.forEach((st, idx) => {
        let opt = document.createElement("option");
        opt.value = idx;
        opt.innerText = st;
        gemStageSelect.appendChild(opt);
    });

    calculateGem();
}

function calculateGem() {
    const gemType = document.getElementById("gemTypeSelect").value;
    const stageIdx = parseInt(document.getElementById("gemStageSelect").value);
    const useStackMode = document.getElementById("toggleStackMode2").checked;
    let count = parseInt(document.getElementById("gemCountInput").value);

    // 防呆機制：輸入負數、0 或非數字時預設為 1
    if (isNaN(count) || count < 1) {
        count = 1;
    }

    const stageName = gemData[gemType].stages[stageIdx];
    const items = gemData[gemType].items;
    
    let totals = {};

    for (let key in items) {
        let val = items[key][stageIdx];
        if (val !== undefined && val !== null && val !== 0 && val !== "0") {
            if (key === "金錢" || key === "money") {
                totals["金錢"] = (totals["金錢"] || 0) + (val * count);
            } else {
                let parsed = parseItem(val);
                if (parsed) {
                    let name = parsed.name || key;
                    totals[name] = (totals[name] || 0) + (parsed.amount * count);
                }
            }
        }
    }

    document.getElementById("gemInfoText").innerHTML = `製作目標：<b>${gemType} (${stageName})</b> × <b>${count}</b> 個`;
    const tbody = document.querySelector("#gemResultTable tbody");
    tbody.innerHTML = "";

    for (let matName in totals) {
        if (totals[matName] > 0 && matName !== "金錢") {
            let tr = document.createElement("tr");
            let displayVal = formatQuantity(totals[matName], useStackMode);
            tr.innerHTML = `<td><b>${matName}</b></td><td>${displayVal}</td>`;
            tbody.appendChild(tr);
        }
    }

    if (totals["金錢"] > 0) {
        let tr = document.createElement("tr");
        tr.className = "money-row";
        tr.innerHTML = `<td><b>💰 金錢 (Coins)</b></td><td><b>$ ${totals["金錢"].toLocaleString()}</b></td>`;
        tbody.appendChild(tr);
    }
}
